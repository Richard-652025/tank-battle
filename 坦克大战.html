<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Battle City</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Arial', sans-serif;
  overflow: hidden;
  user-select: none;
}
#gameContainer {
  position: relative;
  background: #000;
  border: 4px solid #555;
  border-radius: 4px;
  box-shadow: 0 0 40px rgba(255, 200, 0, 0.15), 0 0 80px rgba(255, 100, 0, 0.05);
}
canvas { display: block; }
#ui {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 15px;
  pointer-events: none;
  z-index: 10;
  color: #fff;
  font-size: 14px;
  background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
}
#ui .score { color: #FFD700; font-weight: bold; font-size: 16px; }
#ui .lives { color: #FF6B6B; }
#ui .stage { color: #4ECDC4; }
#ui .enemies-left { color: #FFA07A; }
#overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  pointer-events: none;
  z-index: 20;
}
#overlay .title {
  font-size: 48px;
  font-weight: bold;
  color: #FFD700;
  text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 3px 3px 0 #8B4513, -1px -1px 0 #8B4513;
  margin-bottom: 20px;
  letter-spacing: 8px;
}
#overlay .subtitle {
  font-size: 18px;
  color: #fff;
  text-shadow: 0 0 10px rgba(255,255,255,0.3);
  margin-bottom: 30px;
}
#overlay .hint {
  font-size: 14px;
  color: #aaa;
  animation: blink 1s infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
#overlay .game-over-text {
  font-size: 52px;
  font-weight: bold;
  color: #FF0000;
  text-shadow: 0 0 30px rgba(255,0,0,0.6);
  margin-bottom: 10px;
}
#overlay .restart-hint {
  font-size: 16px;
  color: #aaa;
  animation: blink 1s infinite;
}
#overlay .final-score {
  font-size: 22px;
  color: #FFD700;
  margin-bottom: 15px;
}
#overlay .stage-start {
  font-size: 44px;
  font-weight: bold;
  color: #FFD700;
  text-shadow: 0 0 30px rgba(255,215,0,0.6);
  animation: blink 1s infinite;
}
#controls-hint {
  position: absolute;
  bottom: 10px;
  left: 0; right: 0;
  text-align: center;
  color: #555;
  font-size: 11px;
  z-index: 5;
  pointer-events: none;
}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="ui" style="display:none">
    <span class="score">🏆 <span id="scoreDisplay">0</span></span>
    <span class="stage">第 <span id="stageDisplay">1</span> 关</span>
    <span class="lives">❤️ <span id="livesDisplay">3</span></span>
    <span class="enemies-left">敌人: <span id="enemiesDisplay">20</span></span>
  </div>
  <div id="overlay">
    <div class="title">坦 克 大 战</div>
    <div class="subtitle">— BATTLE CITY —</div>
    <div class="hint">按 ENTER 开始游戏</div>
    <div style="margin-top:60px;font-size:12px;color:#666;">
      方向键移动 | 空格键射击
    </div>
  </div>
  <div id="controls-hint" style="display:none">↑↓←→ 移动 | 空格 射击</div>
</div>

<script>
// ========================================================================
//  坦克大战 - Battle City (HTML5 Canvas) v2
// ========================================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const TILE = 30;
const COLS = 26;
const ROWS = 26;
const W = COLS * TILE;
const H = ROWS * TILE;
canvas.width = W;
canvas.height = H;

const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];

const scoreSpan = document.getElementById('scoreDisplay');
const stageSpan = document.getElementById('stageDisplay');
const livesSpan = document.getElementById('livesDisplay');
const enemiesSpan = document.getElementById('enemiesDisplay');
const uiDiv = document.getElementById('ui');
const overlay = document.getElementById('overlay');
const controlsHint = document.getElementById('controls-hint');

// === AUDIO ===
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playBeep(freq, dur, type, vol) {
  try {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.value = freq;
    gain.gain.value = vol || 0.08;
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
function sfxShoot()  { playBeep(800, 0.08, 'square', 0.06); }
function sfxExplode() {
  playBeep(150, 0.3, 'sawtooth', 0.08);
  setTimeout(() => playBeep(80, 0.2, 'sawtooth', 0.06), 100);
}
function sfxHit()    { playBeep(300, 0.05, 'square', 0.04); }
function sfxStart()  {
  playBeep(523, 0.1, 'square', 0.06);
  setTimeout(() => playBeep(659, 0.1, 'square', 0.06), 120);
  setTimeout(() => playBeep(784, 0.15, 'square', 0.07), 240);
}

// === MAP GENERATION ===
function generateMap() {
  const map = [];
  for (let r = 0; r < ROWS; r++) {
    map[r] = [];
    for (let c = 0; c < COLS; c++) {
      map[r][c] = (r === 0 || r === ROWS-1 || c === 0 || c === COLS-1) ? 1 : 0;
    }
  }

  // Inner brick patterns
  for (let i = 0; i < 2; i++) {
    const row = i * 2 + 3;
    for (let c = 3; c < COLS-3; c += 4) {
      if (map[row][c] === 0) map[row][c] = 1;
    }
  }

  // Vertical brick columns
  for (let r = 6; r < ROWS-6; r += 6) {
    for (let c = 5; c < COLS-5; c += 4) {
      if (map[r][c] === 0) map[r][c] = 1;
      if (map[r][c+1] === 0) map[r][c+1] = 1;
    }
  }

  // 2x2 brick clusters
  const clusters = [
    [6,4],[6,20],[10,10],[10,14],
    [14,4],[14,20],[18,10],[18,14]
  ];
  for (const [r,c] of clusters) {
    if (r < ROWS-2 && c < COLS-2) {
      map[r][c] = 1; map[r][c+1] = 1;
      map[r+1][c] = 1; map[r+1][c+1] = 1;
    }
  }

  // Steel wall at center
  map[12][12] = 2; map[12][13] = 2;
  map[13][12] = 2; map[13][13] = 2;

  // Base at bottom center
  const bR = ROWS - 2;
  const bC = Math.floor(COLS/2) - 1;
  map[bR][bC] = 3; map[bR][bC+1] = 3;
  // Base walls
  map[bR-1][bC-1] = 4; map[bR-1][bC] = 4;
  map[bR-1][bC+1] = 4; map[bR-1][bC+2] = 4;
  map[bR][bC-1] = 4;   map[bR][bC+2] = 4;
  map[bR+1][bC-1] = 4; map[bR+1][bC+2] = 4;

  // === Clear spawn zones (4x4 area each) ===
  // Enemy spawns (top)
  for (let r = 1; r <= 4; r++) {
    for (let c = 1; c <= 4; c++)      map[r][c] = 0;   // top-left
    for (let c = 11; c <= 14; c++)     map[r][c] = 0;   // top-center
    for (let c = 21; c <= 24; c++)     map[r][c] = 0;   // top-right
  }
  // Player spawn (bottom-center, 4x4)
  for (let r = 21; r <= 24; r++) {
    for (let c = 11; c <= 14; c++)     map[r][c] = 0;
  }

  return map;
}

// === EXPLOSION ===
class Explosion {
  constructor(x, y, big) {
    this.x = x;
    this.y = y;
    this.maxR = big ? 30 : 18;
    this.life = 1;
    this.active = true;
    sfxExplode();
  }
  update() {
    this.life -= 0.04;
    if (this.life <= 0) this.active = false;
  }
  draw(ctx) {
    const a = this.life;
    if (a <= 0) return;
    const r = this.maxR * (1 - a * 0.3);
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r + 5);
    grad.addColorStop(0, `rgba(255,255,200,${a})`);
    grad.addColorStop(0.3, `rgba(255,200,50,${a*0.9})`);
    grad.addColorStop(0.6, `rgba(255,100,20,${a*0.7})`);
    grad.addColorStop(1, 'rgba(255,50,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r + 5, 0, Math.PI * 2);
    ctx.fill();
    if (a > 0.5) {
      ctx.fillStyle = `rgba(255,255,255,${(a-0.5)*2})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, r * 0.25, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// === BULLET ===
class Bullet {
  constructor(x, y, dir, owner) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.owner = owner;
    this.speed = owner === 'player' ? 5 : 3.5;
    this.r = 3;
    this.active = true;
    this.dx = DX[dir] * this.speed;
    this.dy = DY[dir] * this.speed;
  }
  update(map) {
    if (!this.active) return;
    this.x += this.dx;
    this.y += this.dy;
    if (this.x < -10 || this.x > W + 10 || this.y < -10 || this.y > H + 10) {
      this.active = false; return;
    }

    const col = Math.floor(this.x / TILE);
    const row = Math.floor(this.y / TILE);
    // Check current and adjacent tiles
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        const tr = row + dr, tc = col + dc;
        if (tr < 0 || tr >= ROWS || tc < 0 || tc >= COLS) continue;
        const t = map[tr][tc];
        if (t !== 1 && t !== 2 && t !== 3 && t !== 4) continue;
        const tx = tc * TILE, ty = tr * TILE;
        if (this.x + this.r > tx && this.x - this.r < tx + TILE &&
            this.y + this.r > ty && this.y - this.r < ty + TILE) {
          if (t === 1 || t === 4) map[tr][tc] = 0;
          if (t === 3) { map[tr][tc] = 0; game.baseDestroyed = true; }
          this.active = false;
          sfxHit();
          return;
        }
      }
    }
  }
  draw(ctx) {
    if (!this.active) return;
    const col = this.owner === 'player' ? '#FFD700' : '#FF6347';
    ctx.shadowColor = col;
    ctx.shadowBlur = 8;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// === TANK BASE ===
class Tank {
  constructor(x, y, dir, type) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.type = type;
    this.size = 36;
    this.speed = 0;
    this.hp = 1;
    this.active = true;
    this.lastShot = 0;
    this.shootCD = 500;
  }
  get cx() { return this.x + this.size / 2; }
  get cy() { return this.y + this.size / 2; }
  rect() { return { x: this.x, y: this.y, w: this.size, h: this.size }; }

  canMove(nx, ny, map, others, self) {
    // Bounds
    if (nx < 0 || ny < 0 || nx + this.size > W || ny + this.size > H) return false;
    // Map collision
    const left = Math.floor(nx / TILE);
    const right = Math.floor((nx + this.size - 1) / TILE);
    const top = Math.floor(ny / TILE);
    const bottom = Math.floor((ny + this.size - 1) / TILE);
    for (let r = top; r <= bottom; r++) {
      for (let c = left; c <= right; c++) {
        const t = map[r][c];
        if (t === 1 || t === 2 || t === 3 || t === 4) return false;
      }
    }
    // Tank collision
    for (const t of others) {
      if (t === self || !t.active) continue;
      const o = t.rect();
      if (nx < o.x + o.w && nx + this.size > o.x &&
          ny < o.y + o.h && ny + this.size > o.y) return false;
    }
    return true;
  }

  shoot(bullets) {
    const now = Date.now();
    if (now - this.lastShot < this.shootCD) return;
    this.lastShot = now;
    const cx = this.x + this.size / 2;
    const cy = this.y + this.size / 2;
    const off = this.size / 2 + 5;
    const bx = cx + DX[this.dir] * off - 2;
    const by = cy + DY[this.dir] * off - 2;
    const owner = this.type === 'player' ? 'player' : 'enemy';
    bullets.push(new Bullet(bx, by, this.dir, owner));
    if (owner === 'player') sfxShoot();
  }
}

// === PLAYER ===
class PlayerTank extends Tank {
  constructor(x, y) {
    super(x, y, DIR.UP, 'player');
    this.speed = 2.5;
    this.shootCD = 300;
    this.invincible = false;
    this.invTimer = 0;
  }
  update(map, enemies, bullets, keys) {
    if (!this.active) return;
    if (this.invincible) {
      this.invTimer--;
      if (this.invTimer <= 0) this.invincible = false;
    }

    // Determine direction
    let nd = this.dir;
    if (keys['ArrowUp']||keys['w']||keys['W']) nd = DIR.UP;
    else if (keys['ArrowDown']||keys['s']||keys['S']) nd = DIR.DOWN;
    else if (keys['ArrowLeft']||keys['a']||keys['A']) nd = DIR.LEFT;
    else if (keys['ArrowRight']||keys['d']||keys['D']) nd = DIR.RIGHT;
    this.dir = nd;

    const moving = keys['ArrowUp']||keys['w']||keys['W']||
                   keys['ArrowDown']||keys['s']||keys['S']||
                   keys['ArrowLeft']||keys['a']||keys['A']||
                   keys['ArrowRight']||keys['d']||keys['D'];

    if (moving) {
      const nx = this.x + DX[this.dir] * this.speed;
      const ny = this.y + DY[this.dir] * this.speed;
      if (this.canMove(nx, ny, map, enemies, this)) {
        this.x = nx; this.y = ny;
      } else {
        // Wall sliding
        if (DX[this.dir] !== 0 && this.canMove(nx, this.y, map, enemies, this)) this.x = nx;
        else if (DY[this.dir] !== 0 && this.canMove(this.x, ny, map, enemies, this)) this.y = ny;
      }
    }

    if (keys[' '] || keys['Space']) this.shoot(bullets);
  }
  draw(ctx) {
    if (!this.active) return;
    const x = this.x, y = this.y, s = this.size;
    const cx = x + s/2, cy = y + s/2;
    const flash = this.invincible && Math.floor(this.invTimer / 4) % 2 === 0;

    ctx.save();

    // Body
    ctx.fillStyle = flash ? '#FFFFFF' : '#F5A623';
    ctx.shadowColor = '#F5A623';
    ctx.shadowBlur = flash ? 15 : 5;
    roundRect(ctx, x+3, y+3, s-6, s-6, 4);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Tracks
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(x+2, y+4, 6, s-8);
    ctx.fillRect(x+s-8, y+4, 6, s-8);
    ctx.fillStyle = '#6B5010';
    for (let i = 0; i < 5; i++) {
      ctx.fillRect(x+3, y+6+i*6, 4, 2);
      ctx.fillRect(x+s-7, y+6+i*6, 4, 2);
    }

    // Turret
    ctx.fillStyle = '#D4890A';
    ctx.beginPath();
    ctx.arc(cx, cy, 8, 0, Math.PI*2);
    ctx.fill();

    // Barrel
    ctx.strokeStyle = '#8B5E00';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + DX[this.dir]*14, cy + DY[this.dir]*14);
    ctx.stroke();

    ctx.restore();
  }
}

// === ENEMY ===
class EnemyTank extends Tank {
  constructor(x, y, type) {
    super(x, y, DIR.DOWN, type);
    switch(type) {
      case 'basic':
        this.speed=1.2; this.shootCD=1500; this.hp=1;
        this.col='#C0C0C0'; this.trCol='#888'; this.tuCol='#999'; this.pts=100; break;
      case 'fast':
        this.speed=2.5; this.shootCD=1200; this.hp=1;
        this.col='#FF6347'; this.trCol='#A04030'; this.tuCol='#CC4030'; this.pts=200; break;
      case 'armored':
        this.speed=0.8; this.shootCD=1800; this.hp=3;
        this.col='#8B0000'; this.trCol='#5A0000'; this.tuCol='#6B0000'; this.pts=300; break;
    }
    this.changeTimer = Math.floor(Math.random() * 80 + 40);
  }

  update(map, others, bullets, player, bx, by) {
    if (!this.active) return;
    this.changeTimer--;

    if (this.changeTimer <= 0) {
      this.changeTimer = Math.floor(Math.random() * 80 + 40);
      const r = Math.random();
      if (r < 0.35 && player && player.active) {
        const dx = player.cx - this.cx, dy = player.cy - this.cy;
        this.dir = Math.abs(dx) > Math.abs(dy) ? (dx>0?DIR.RIGHT:DIR.LEFT) : (dy>0?DIR.DOWN:DIR.UP);
      } else if (r < 0.6) {
        const dx = bx - this.cx, dy = by - this.cy;
        this.dir = Math.abs(dx) > Math.abs(dy) ? (dx>0?DIR.RIGHT:DIR.LEFT) : (dy>0?DIR.DOWN:DIR.UP);
      } else {
        this.dir = Math.floor(Math.random() * 4);
      }
    }

    const nx = this.x + DX[this.dir] * this.speed;
    const ny = this.y + DY[this.dir] * this.speed;
    if (this.canMove(nx, ny, map, others, this)) {
      this.x = nx; this.y = ny;
    } else {
      this.changeTimer = 0;
      // Try other directions
      for (let i = 0; i < 4; i++) {
        const d = (this.dir + 1 + i) % 4;
        const tx = this.x + DX[d] * this.speed;
        const ty = this.y + DY[d] * this.speed;
        if (this.canMove(tx, ty, map, others, this)) {
          this.dir = d; this.x = tx; this.y = ty; break;
        }
      }
    }

    // Clamp
    this.x = Math.max(0, Math.min(W - this.size, this.x));
    this.y = Math.max(0, Math.min(H - this.size, this.y));

    // Shoot
    let shoot = Math.random() < 0.015;
    if (player && player.active) {
      const dx = player.cx - this.cx, dy = player.cy - this.cy;
      const facing = (this.dir===DIR.UP && dy<0 && Math.abs(dx)<this.size) ||
                     (this.dir===DIR.DOWN && dy>0 && Math.abs(dx)<this.size) ||
                     (this.dir===DIR.LEFT && dx<0 && Math.abs(dy)<this.size) ||
                     (this.dir===DIR.RIGHT && dx>0 && Math.abs(dy)<this.size);
      if (facing) shoot = shoot || Math.random() < 0.04;
    }
    if (shoot) this.shoot(bullets);
  }

  draw(ctx) {
    if (!this.active) return;
    const x = this.x, y = this.y, s = this.size, cx = x+s/2, cy = y+s/2;
    ctx.save();
    ctx.fillStyle = this.col;
    ctx.shadowColor = this.col;
    ctx.shadowBlur = 3;
    roundRect(ctx, x+3, y+3, s-6, s-6, 4);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = this.trCol;
    ctx.fillRect(x+2, y+4, 6, s-8);
    ctx.fillRect(x+s-8, y+4, 6, s-8);
    ctx.fillStyle = this.tuCol;
    ctx.beginPath();
    ctx.arc(cx, cy, 7, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + DX[this.dir]*13, cy + DY[this.dir]*13);
    ctx.stroke();
    if (this.hp > 1) {
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('♥'.repeat(this.hp), cx, y - 3);
    }
    ctx.restore();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// === GAME ===
class Game {
  constructor() {
    this.state = 'title';
    this.map = [];
    this.player = null;
    this.enemies = [];
    this.bullets = [];
    this.explosions = [];
    this.score = 0;
    this.lives = 3;
    this.stage = 1;
    this.spawned = 0;
    this.defeated = 0;
    this.maxEnemies = 20;
    this.maxOnScreen = 4;
    this.spawnTimer = 0;
    this.baseDestroyed = false;
    this.keys = {};
    this.startTimer = 0; // countdown before game starts
  }

  get alive() { return this.enemies.filter(e => e.active); }

  init() {
    this.map = generateMap();
    this.player = new PlayerTank(11.5 * TILE + 2, 22 * TILE + 2);
    this.player.active = true;
    this.player.invincible = true;
    this.player.invTimer = 180;
    this.enemies = [];
    this.bullets = [];
    this.explosions = [];
    this.spawned = 0;
    this.defeated = 0;
    this.baseDestroyed = false;
    this.spawnTimer = 90;
    const total = this.maxEnemies + (this.stage - 1) * 2;
    this.totalEnemies = Math.min(total, 40);

    uiDiv.style.display = 'flex';
    controlsHint.style.display = 'block';
    this.updateUI();

    // Show stage start announcement
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <div class="stage-start">第 ${this.stage} 关</div>
      <div style="font-size:16px;color:#aaa;margin-top:15px;">准备战斗！</div>
    `;
    sfxStart();
    this.startTimer = 90; // ~1.5 seconds
    this.state = 'starting';
  }

  updateUI() {
    scoreSpan.textContent = this.score;
    stageSpan.textContent = this.stage;
    livesSpan.textContent = this.lives;
    const left = this.totalEnemies - this.defeated;
    enemiesSpan.textContent = left > 0 ? left : 0;
  }

  spawnEnemy() {
    const r = Math.random();
    let type;
    if (this.stage >= 3 && r < 0.2) type = 'armored';
    else if (this.stage >= 2 && r < 0.45) type = 'fast';
    else type = 'basic';

    const pos = this.spawned % 3;
    const sx = [1, 11, 21][pos] * TILE + 2;
    const sy = 2 * TILE + 2;

    // Check spawn area is clear
    for (const t of this.enemies) {
      if (!t.active) continue;
      if (Math.abs(t.x - sx) < 40 && Math.abs(t.y - sy) < 40) return false;
    }
    if (this.player && this.player.active &&
        Math.abs(this.player.x - sx) < 40 && Math.abs(this.player.y - sy) < 40) return false;

    const enemy = new EnemyTank(sx, sy, type);
    this.enemies.push(enemy);
    this.spawned++;
    // Flash effect
    for (let i = 0; i < 3; i++) {
      const ex = new Explosion(sx + 18, sy + 18);
      ex.life = 0.2;
      ex.maxR = 12;
      this.explosions.push(ex);
    }
    return true;
  }

  update() {
    if (this.state === 'title' || this.state === 'gameover') return;

    // Starting countdown
    if (this.state === 'starting') {
      this.startTimer--;
      if (this.startTimer <= 0) {
        this.state = 'playing';
        overlay.style.display = 'none';
      }
      return;
    }

    // Spawn enemies
    if (this.spawned < this.totalEnemies) {
      if (this.alive.length < this.maxOnScreen) {
        this.spawnTimer--;
        if (this.spawnTimer <= 0) {
          this.spawnTimer = 100;
          this.spawnEnemy();
        }
      }
    }

    // Update player
    if (this.player && this.player.active) {
      this.player.update(this.map, this.enemies, this.bullets, this.keys);
    }

    // Update enemies
    for (const e of this.enemies) {
      if (!e.active) continue;
      e.update(this.map, [this.player, ...this.enemies], this.bullets,
               this.player, 12.5 * TILE, 25 * TILE);
    }

    // Update bullets and check hits
    for (const b of this.bullets) {
      if (!b.active) continue;
      b.update(this.map);

      if (!b.active) continue;

      if (b.owner === 'player') {
        for (const e of this.enemies) {
          if (!e.active) continue;
          const r = e.rect();
          if (b.x > r.x && b.x < r.x + r.w && b.y > r.y && b.y < r.y + r.h) {
            b.active = false;
            e.hp--;
            if (e.hp <= 0) {
              e.active = false;
              this.defeated++;
              this.score += e.pts;
              this.explosions.push(new Explosion(e.cx, e.cy, true));
              this.updateUI();
            } else {
              this.explosions.push(new Explosion(e.cx, e.cy, false));
            }
            break;
          }
        }
      } else if (b.owner === 'enemy' && this.player && this.player.active) {
        const r = this.player.rect();
        if (b.x > r.x && b.x < r.x + r.w && b.y > r.y && b.y < r.y + r.h) {
          b.active = false;
          if (!this.player.invincible) {
            this.player.active = false;
            this.lives--;
            this.explosions.push(new Explosion(this.player.cx, this.player.cy, true));
            this.updateUI();
            if (this.lives <= 0) {
              this.gameOver();
            } else {
              game.respawnPlayer();
            }
          }
        }
      }
    }

    // Cleanup
    this.bullets = this.bullets.filter(b => b.active);
    this.enemies = this.enemies.filter(e => e.active);

    // Explosions
    for (const ex of this.explosions) ex.update();
    this.explosions = this.explosions.filter(e => e.active);

    // Win check
    if (this.spawned >= this.totalEnemies && this.defeated >= this.totalEnemies) {
      this.stageClear();
      return;
    }

    // Base destroyed check
    if (this.baseDestroyed) {
      this.gameOver();
      return;
    }

    this.updateUI();
  }

  respawnPlayer() {
    setTimeout(() => {
      if (this.state === 'gameover') return;
      this.player.x = 11.5 * TILE + 2;
      this.player.y = 22 * TILE + 2;
      this.player.active = true;
      this.player.invincible = true;
      this.player.invTimer = 180;
      this.player.dir = DIR.UP;
    }, 800);
  }

  gameOver() {
    this.state = 'gameover';
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <div class="game-over-text">GAME OVER</div>
      <div class="final-score">最终得分: ${this.score}</div>
      <div class="restart-hint">按 ENTER 重新开始</div>
    `;
    sfxExplode();
    setTimeout(() => sfxExplode(), 400);
  }

  stageClear() {
    this.state = 'gameover';
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <div style="font-size:44px;color:#4ECDC4;font-weight:bold;text-shadow:0 0 20px rgba(78,205,196,0.5);margin-bottom:10px;">STAGE CLEAR!</div>
      <div style="font-size:20px;color:#FFD700;margin-bottom:10px;">得分: ${this.score}</div>
      <div style="font-size:16px;color:#aaa;">下一关准备中...</div>
    `;
    setTimeout(() => {
      this.stage++;
      this.init();
    }, 3000);
  }

  restart() {
    this.score = 0;
    this.lives = 3;
    this.stage = 1;
    this.init();
  }

  draw() {
    // Background - classic dark green
    ctx.fillStyle = '#2d2d2d';
    ctx.fillRect(0, 0, W, H);

    this.drawMap(ctx);

    // Gird lines (subtle)
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 0.5;
    for (let r = 0; r <= ROWS; r++) {
      ctx.beginPath(); ctx.moveTo(0, r*TILE); ctx.lineTo(W, r*TILE); ctx.stroke();
    }
    for (let c = 0; c <= COLS; c++) {
      ctx.beginPath(); ctx.moveTo(c*TILE, 0); ctx.lineTo(c*TILE, H); ctx.stroke();
    }

    // Explosions
    for (const ex of this.explosions) ex.draw(ctx);

    // Tanks & bullets
    if (this.player) this.player.draw(ctx);
    for (const e of this.enemies) e.draw(ctx);
    for (const b of this.bullets) b.draw(ctx);

    // Base destroyed indicator
    if (this.baseDestroyed && this.state !== 'gameover') {
      ctx.fillStyle = 'rgba(255,0,0,0.3)';
      ctx.fillRect(11*TILE, 24*TILE, 4*TILE, 2*TILE);
      ctx.fillStyle = '#FF0000';
      ctx.font = 'bold 16px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('基地被毁！', 13*TILE, 25*TILE);
    }
  }

  drawMap(ctx) {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const t = this.map[r][c];
        if (t === 0) continue;
        const x = c * TILE, y = r * TILE;
        if (t === 1) {
          ctx.fillStyle = '#8B4513';
          ctx.fillRect(x, y, TILE, TILE);
          ctx.strokeStyle = '#6B3410';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(x, y, TILE, TILE);
          ctx.strokeStyle = '#A0522D';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(x, y+TILE/2); ctx.lineTo(x+TILE, y+TILE/2);
          ctx.moveTo(x+TILE/2, y); ctx.lineTo(x+TILE/2, y+TILE/2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x+TILE/4, y+TILE/2); ctx.lineTo(x+TILE/4, y+TILE);
          ctx.moveTo(x+TILE*3/4, y+TILE/2); ctx.lineTo(x+TILE*3/4, y+TILE);
          ctx.stroke();
        } else if (t === 2) {
          ctx.fillStyle = '#808080';
          ctx.fillRect(x, y, TILE, TILE);
          ctx.fillStyle = '#999';
          ctx.fillRect(x+3,y+3,TILE/2-3,TILE/2-3);
          ctx.fillRect(x+TILE/2,y+3,TILE/2-3,TILE/2-3);
          ctx.fillRect(x+3,y+TILE/2,TILE/2-3,TILE/2-3);
          ctx.fillRect(x+TILE/2,y+TILE/2,TILE/2-3,TILE/2-3);
          ctx.fillStyle = '#666';
          [[x+4,y+4],[x+TILE-5,y+4],[x+4,y+TILE-5],[x+TILE-5,y+TILE-5],
           [x+TILE/2,y+4],[x+4,y+TILE/2],[x+TILE-5,y+TILE/2],[x+TILE/2,y+TILE-5]]
            .forEach(([px,py]) => { ctx.beginPath(); ctx.arc(px,py,1.5,0,Math.PI*2); ctx.fill(); });
        } else if (t === 3) {
          const gx = x+TILE/2, gy = y+TILE/2;
          ctx.fillStyle = '#FFD700';
          ctx.shadowColor = '#FFD700';
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.moveTo(gx, gy-10);
          ctx.lineTo(gx-8, gy+2); ctx.lineTo(gx-3, gy+2);
          ctx.lineTo(gx-5, gy+10); ctx.lineTo(gx, gy+4);
          ctx.lineTo(gx+5, gy+10); ctx.lineTo(gx+3, gy+2);
          ctx.lineTo(gx+8, gy+2);
          ctx.closePath();
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#B8860B';
          ctx.font = 'bold 14px Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('★', gx, gy+1);
        } else if (t === 4) {
          ctx.fillStyle = '#A0522D';
          ctx.fillRect(x, y, TILE, TILE);
          ctx.fillStyle = '#C47A3E';
          ctx.fillRect(x+2, y+2, TILE-4, TILE-4);
          ctx.strokeStyle = '#8B5E3C';
          ctx.lineWidth = 1;
          ctx.strokeRect(x+2, y+2, TILE-4, TILE-4);
        }
      }
    }
  }
}

// === MAIN ===
const game = new Game();

function gameLoop(time) {
  game.update();
  game.draw();
  requestAnimationFrame(gameLoop);
}

// Input
document.addEventListener('keydown', (e) => {
  game.keys[e.key] = true;
  if (e.key === ' ' || e.key === 'Space') e.preventDefault();

  if (e.key === 'Enter') {
    if (game.state === 'title') {
      game.restart();
    } else if (game.state === 'gameover') {
      game.restart();
    }
  }
});
document.addEventListener('keyup', (e) => {
  game.keys[e.key] = false;
});
window.addEventListener('keydown', (e) => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});

// Start
requestAnimationFrame(gameLoop);
</script>
