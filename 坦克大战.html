<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Battle City</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Arial', sans-serif;
  overflow: hidden;
  user-select: none;
}
#gameContainer {
  position: relative;
  background: #000;
  border: 4px solid #444;
  border-radius: 4px;
  box-shadow: 0 0 40px rgba(255, 200, 0, 0.15), 0 0 80px rgba(255, 100, 0, 0.05);
}
canvas { display: block; }
#ui {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 15px;
  pointer-events: none;
  z-index: 10;
  color: #fff;
  font-size: 14px;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
}
#ui .score { color: #FFD700; font-weight: bold; font-size: 16px; }
#ui .lives { color: #FF6B6B; }
#ui .stage { color: #4ECDC4; }
#ui .enemies-left { color: #FFA07A; }
#info {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  pointer-events: none;
  z-index: 20;
}
#info .title {
  font-size: 48px;
  font-weight: bold;
  color: #FFD700;
  text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 3px 3px 0 #8B4513, -1px -1px 0 #8B4513;
  margin-bottom: 20px;
  letter-spacing: 8px;
}
#info .subtitle {
  font-size: 18px;
  color: #fff;
  text-shadow: 0 0 10px rgba(255,255,255,0.3);
  margin-bottom: 30px;
}
#info .hint {
  font-size: 14px;
  color: #aaa;
  animation: blink 1s infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
#info .game-over {
  font-size: 52px;
  font-weight: bold;
  color: #FF0000;
  text-shadow: 0 0 30px rgba(255,0,0,0.6);
  margin-bottom: 10px;
}
#info .restart-hint {
  font-size: 16px;
  color: #aaa;
  animation: blink 1s infinite;
}
#info .final-score {
  font-size: 22px;
  color: #FFD700;
  margin-bottom: 15px;
}
#controls-hint {
  position: absolute;
  bottom: 10px;
  left: 0; right: 0;
  text-align: center;
  color: #555;
  font-size: 11px;
  z-index: 5;
  pointer-events: none;
}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="ui" style="display:none">
    <span class="score">🏆 <span id="scoreDisplay">0</span></span>
    <span class="stage">第 <span id="stageDisplay">1</span> 关</span>
    <span class="lives">❤️ <span id="livesDisplay">3</span></span>
    <span class="enemies-left">敌人: <span id="enemiesDisplay">20</span></span>
  </div>
  <div id="info">
    <div class="title">坦 克 大 战</div>
    <div class="subtitle">— BATTLE CITY —</div>
    <div class="hint">按 ENTER 开始游戏</div>
    <div style="margin-top:60px;font-size:12px;color:#666;">
      方向键移动 | 空格键射击
    </div>
  </div>
  <div id="controls-hint" style="display:none">↑↓←→ 移动 | 空格 射击</div>
</div>

<script>
// ========================================================================
//  坦克大战 - Battle City (HTML5 Canvas)
// ========================================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// === CONSTANTS ===
const TILE = 30;
const COLS = 26;
const ROWS = 26;
const UI_HEIGHT = 0; // UI is overlaid
const W = COLS * TILE;
const H = ROWS * TILE;
canvas.width = W;
canvas.height = H;

const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];

// === DOM REFS ===
const scoreSpan = document.getElementById('scoreDisplay');
const stageSpan = document.getElementById('stageDisplay');
const livesSpan = document.getElementById('livesDisplay');
const enemiesSpan = document.getElementById('enemiesDisplay');
const uiDiv = document.getElementById('ui');
const infoDiv = document.getElementById('info');
const controlsHint = document.getElementById('controls-hint');

// === AUDIO (Web Audio beep) ===
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playBeep(freq, duration, type = 'square', vol = 0.1) {
  try {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = vol;
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}
function sfxShoot() { playBeep(800, 0.08, 'square', 0.06); }
function sfxExplode() { playBeep(150, 0.3, 'sawtooth', 0.08);
  setTimeout(() => playBeep(80, 0.2, 'sawtooth', 0.06), 100); }
function sfxHit() { playBeep(300, 0.05, 'square', 0.04); }

// === MAP GENERATION ===
// 0=empty, 1=brick, 2=steel, 3=base(eagle), 4=base_wall
function generateMap() {
  const map = [];
  for (let r = 0; r < ROWS; r++) {
    map[r] = [];
    for (let c = 0; c < COLS; c++) {
      // border
      if (r === 0 || r === ROWS-1 || c === 0 || c === COLS-1) {
        map[r][c] = 1; // brick border
      } else {
        map[r][c] = 0;
      }
    }
  }
  // Inner walls patterns
  const patterns = [
    // Pattern 1: scattered blocks
    [3,3,6,6,9,9,12,12,15,15,18,18,21,21],
    [4,4,7,7,10,10,13,13,16,16,19,19,22,22],
    // add some variety
  ];

  // Place brick walls in patterns
  for (let i = 0; i < patterns.length; i++) {
    for (let j = 0; j < patterns[i].length; j++) {
      const c = patterns[i][j];
      const r = i * 2 + 3;
      if (r < ROWS-1 && c < COLS-1) {
        map[r][c] = 1;
        map[r][c+1] = 1;
        map[r+1][c] = 1;
        map[r+1][c+1] = 1;
      }
    }
  }

  // Some steel walls
  map[12][12] = 2; map[12][13] = 2;
  map[13][12] = 2; map[13][13] = 2;

  // Additional wall clusters
  const clusters = [[5,5],[5,20],[10,8],[10,17],[16,5],[16,20],[20,10],[20,15]];
  for (const [r,c] of clusters) {
    if (r < ROWS-2 && c < COLS-2) {
      map[r][c] = 1; map[r][c+1] = 1;
      map[r+1][c] = 1; map[r+1][c+1] = 1;
    }
  }

  // Horizontal brick lines
  for (let c = 3; c < COLS-3; c += 4) {
    if (map[8][c] === 0) map[8][c] = 1;
    if (map[17][c] === 0) map[17][c] = 1;
  }

  // Base (eagle) at bottom center
  const baseR = ROWS - 2;
  const baseC = Math.floor(COLS / 2) - 1;
  map[baseR][baseC] = 3; map[baseR][baseC+1] = 3;
  // Walls around base
  map[baseR-1][baseC-1] = 4; map[baseR-1][baseC] = 4; map[baseR-1][baseC+1] = 4; map[baseR-1][baseC+2] = 4;
  map[baseR][baseC-1] = 4; map[baseR][baseC+2] = 4;
  map[baseR+1][baseC-1] = 4; map[baseR+1][baseC+2] = 4;

  // Clear spawn points
  // Top-left
  map[2][2] = 0; map[2][3] = 0; map[3][2] = 0; map[3][3] = 0;
  // Top-center
  map[2][12] = 0; map[2][13] = 0; map[3][12] = 0; map[3][13] = 0;
  // Top-right
  map[2][22] = 0; map[2][23] = 0; map[3][22] = 0; map[3][23] = 0;
  // Player start
  map[22][12] = 0; map[22][13] = 0; map[23][12] = 0; map[23][13] = 0;

  return map;
}

// === EXPLOSION ===
class Explosion {
  constructor(x, y, big = false) {
    this.x = x; this.y = y;
    this.radius = big ? 30 : 18;
    this.maxRadius = this.radius;
    this.life = 1;
    this.active = true;
    sfxExplode();
  }
  update() {
    this.life -= 0.04;
    this.radius = this.maxRadius * (1 - this.life);
    if (this.life <= 0) this.active = false;
  }
  draw(ctx) {
    const a = this.life;
    const r = this.radius;
    // Outer glow
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
    grad.addColorStop(0, `rgba(255,255,200,${a})`);
    grad.addColorStop(0.3, `rgba(255,200,50,${a*0.9})`),
    grad.addColorStop(0.6, `rgba(255,100,20,${a*0.7})`);
    grad.addColorStop(1, `rgba(255,50,0,0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fill();
    // inner bright core
    if (a > 0.5) {
      ctx.fillStyle = `rgba(255,255,255,${(a-0.5)*2})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, r * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// === BULLET ===
class Bullet {
  constructor(x, y, dir, owner) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.owner = owner; // 'player' or 'enemy'
    this.speed = owner === 'player' ? 5 : 3.5;
    this.radius = 3;
    this.active = true;
    this.dx = DX[dir] * this.speed;
    this.dy = DY[dir] * this.speed;
  }
  update(map) {
    if (!this.active) return;
    this.x += this.dx;
    this.y += this.dy;
    // Out of bounds
    if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) {
      this.active = false;
      return;
    }
    // Check wall collision
    const cx = Math.floor(this.x / TILE);
    const cy = Math.floor(this.y / TILE);
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        const tc = cx + dx;
        const tr = cy + dy;
        if (tc < 0 || tc >= COLS || tr < 0 || tr >= ROWS) continue;
        const tile = map[tr][tc];
        if (tile === 1 || tile === 2 || tile === 4) {
          // Check actual overlap
          const bx = this.x - this.radius, by = this.y - this.radius;
          const bw = this.radius * 2, bh = this.radius * 2;
          const tx = tc * TILE, ty = tr * TILE;
          if (bx < tx + TILE && bx + bw > tx && by < ty + TILE && by + bh > ty) {
            if (tile === 1) {
              map[tr][tc] = 0;
              sfxHit();
            } else if (tile === 4) {
              map[tr][tc] = 0;
              sfxHit();
            } else {
              sfxHit();
            }
            this.active = false;
            return;
          }
        }
      }
    }
    // Check base
    for (let tr = ROWS-3; tr < ROWS; tr++) {
      for (let tc = Math.floor(COLS/2)-2; tc < Math.floor(COLS/2)+2; tc++) {
        if (tr < 0 || tr >= ROWS || tc < 0 || tc >= COLS) continue;
        if (map[tr][tc] === 3) {
          const bx = this.x - this.radius, by = this.y - this.radius;
          const bw = this.radius * 2, bh = this.radius * 2;
          const tx = tc * TILE, ty = tr * TILE;
          if (bx < tx + TILE && bx + bw > tx && by < ty + TILE && by + bh > ty) {
            map[tr][tc] = 0;
            this.active = false;
            game.baseDestroyed = true;
            sfxExplode();
            return;
          }
        }
      }
    }
  }
  draw(ctx) {
    if (!this.active) return;
    ctx.fillStyle = this.owner === 'player' ? '#FFD700' : '#FF6347';
    ctx.shadowColor = this.owner === 'player' ? '#FFD700' : '#FF6347';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // Trail
    ctx.fillStyle = this.owner === 'player' ? 'rgba(255,215,0,0.3)' : 'rgba(255,99,71,0.3)';
    ctx.beginPath();
    ctx.arc(this.x - this.dx * 0.5, this.y - this.dy * 0.5, this.radius * 0.7, 0, Math.PI * 2);
    ctx.fill();
  }
}

// === TANK ===
class Tank {
  constructor(x, y, dir, type) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.type = type; // 'player', 'basic', 'fast', 'armored'
    this.size = 36;
    this.speed = 0;
    this.hp = 1;
    this.active = true;
    this.lastShotTime = 0;
    this.shootCooldown = 500; // ms
    this.moveDir = dir;
    this.moveTimer = 0;
  }

  get cx() { return this.x + this.size / 2; }
  get cy() { return this.y + this.size / 2; }

  getRect() {
    return { x: this.x, y: this.y, w: this.size, h: this.size };
  }

  collidesWithRect(rect) {
    const r1 = this.getRect();
    return r1.x < rect.x + rect.w && r1.x + r1.w > rect.x &&
           r1.y < rect.y + rect.h && r1.y + r1.h > rect.y;
  }

  collidesWithMap(x, y, map) {
    const s = this.size;
    const margin = 0;
    // Check all tiles this rect overlaps
    const left = Math.floor((x + margin) / TILE);
    const right = Math.floor((x + s - 1 - margin) / TILE);
    const top = Math.floor((y + margin) / TILE);
    const bottom = Math.floor((y + s - 1 - margin) / TILE);

    for (let r = top; r <= bottom; r++) {
      for (let c = left; c <= right; c++) {
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return true;
        const tile = map[r][c];
        if (tile === 1 || tile === 2 || tile === 3 || tile === 4) return true;
      }
    }
    return false;
  }

  collidesWithTanks(x, y, others, exclude) {
    const rect = { x, y, w: this.size, h: this.size };
    for (const tank of others) {
      if (tank === exclude || !tank.active) continue;
      const tRect = tank.getRect();
      if (rect.x < tRect.x + tRect.w && rect.x + rect.w > tRect.x &&
          rect.y < tRect.y + tRect.h && rect.y + rect.h > tRect.y) {
        return true;
      }
    }
    return false;
  }

  canMove(x, y, map, others, exclude) {
    return !this.collidesWithMap(x, y, map) && !this.collidesWithTanks(x, y, others, exclude);
  }

  shoot(bullets) {
    const now = Date.now();
    if (now - this.lastShotTime < this.shootCooldown) return;
    this.lastShotTime = now;
    const cx = this.x + this.size / 2;
    const cy = this.y + this.size / 2;
    const offset = this.size / 2 + 4;
    const bx = cx + DX[this.dir] * offset - 3;
    const by = cy + DY[this.dir] * offset - 3;
    const owner = this.type === 'player' ? 'player' : 'enemy';
    bullets.push(new Bullet(bx, by, this.dir, owner));
    if (owner === 'player') sfxShoot();
  }

  draw(ctx) {}
}

// === PLAYER TANK ===
class PlayerTank extends Tank {
  constructor(x, y) {
    super(x, y, DIR.UP, 'player');
    this.speed = 2.5;
    this.hp = 1;
    this.shootCooldown = 300;
    this.invincible = false;
    this.invincibleTimer = 0;
    this.respawnTimer = 0;
  }

  update(map, others, bullets, keys) {
    if (!this.active) return;

    // Invincibility
    if (this.invincible) {
      this.invincibleTimer--;
      if (this.invincibleTimer <= 0) this.invincible = false;
    }

    // Movement
    let newDir = this.dir;
    if (keys['ArrowUp'] || keys['w'] || keys['W']) newDir = DIR.UP;
    else if (keys['ArrowDown'] || keys['s'] || keys['S']) newDir = DIR.DOWN;
    else if (keys['ArrowLeft'] || keys['a'] || keys['A']) newDir = DIR.LEFT;
    else if (keys['ArrowRight'] || keys['d'] || keys['D']) newDir = DIR.RIGHT;

    this.dir = newDir;
    let moving = false;
    if (keys['ArrowUp'] || keys['w'] || keys['W'] ||
        keys['ArrowDown'] || keys['s'] || keys['S'] ||
        keys['ArrowLeft'] || keys['a'] || keys['A'] ||
        keys['ArrowRight'] || keys['d'] || keys['D']) {
      moving = true;
    }

    if (moving) {
      const nx = this.x + DX[this.dir] * this.speed;
      const ny = this.y + DY[this.dir] * this.speed;
      if (this.canMove(nx, ny, map, others, this)) {
        this.x = nx;
        this.y = ny;
      } else if (DX[this.dir] !== 0) {
        // Try to slide along wall
        const ny2 = this.y + 0;
        if (this.canMove(nx, ny2, map, others, this)) {
          this.x = nx;
        }
      } else if (DY[this.dir] !== 0) {
        const nx2 = this.x + 0;
        if (this.canMove(nx2, ny, map, others, this)) {
          this.y = ny;
        }
      }
    }

    // Shoot
    if (keys[' '] || keys['Space']) {
      this.shoot(bullets);
    }

    // Clamp
    this.x = Math.max(0, Math.min(W - this.size, this.x));
    this.y = Math.max(0, Math.min(H - this.size, this.y));
  }

  draw(ctx) {
    if (!this.active) {
      if (this.respawnTimer > 0) {
        this.respawnTimer--;
        const blink = Math.floor(this.respawnTimer / 4) % 2 === 0;
        if (!blink) return;
      } else {
        return;
      }
    }
    const x = this.x, y = this.y, s = this.size;
    const cx = x + s/2, cy = y + s/2;
    const inv = this.invincible && Math.floor(this.invincibleTimer / 4) % 2 === 0;

    ctx.save();

    // Tank body
    const bodyColor = inv ? '#FFFFFF' : '#F5A623';
    ctx.fillStyle = bodyColor;
    ctx.shadowColor = '#F5A623';
    ctx.shadowBlur = inv ? 15 : 5;

    // Main body (rounded rectangle)
    const pad = 3;
    roundRect(ctx, x + pad, y + pad, s - pad*2, s - pad*2, 4);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Tracks
    ctx.fillStyle = '#8B6914';
    const trackW = 6, trackH = s - 8;
    ctx.fillRect(x + 2, y + 4, trackW, trackH);
    ctx.fillRect(x + s - 8, y + 4, trackW, trackH);

    // Track details
    ctx.fillStyle = '#6B5010';
    for (let i = 0; i < 5; i++) {
      const ty = y + 6 + i * 6;
      ctx.fillRect(x + 3, ty, trackW - 2, 2);
      ctx.fillRect(x + s - 7, ty, trackW - 2, 2);
    }

    // Turret (circle)
    ctx.fillStyle = '#D4890A';
    ctx.beginPath();
    ctx.arc(cx, cy, 8, 0, Math.PI * 2);
    ctx.fill();

    // Barrel
    ctx.fillStyle = '#B8760A';
    ctx.strokeStyle = '#8B5E00';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + DX[this.dir] * 14, cy + DY[this.dir] * 14);
    ctx.stroke();

    ctx.restore();
  }
}

// === ENEMY TANK ===
class EnemyTank extends Tank {
  constructor(x, y, type) {
    super(x, y, DIR.DOWN, type);
    switch(type) {
      case 'basic':
        this.speed = 1.2; this.hp = 1; this.shootCooldown = 1500;
        this.color = '#C0C0C0'; this.trackColor = '#888'; this.turretColor = '#999';
        this.score = 100; break;
      case 'fast':
        this.speed = 2.5; this.hp = 1; this.shootCooldown = 1200;
        this.color = '#FF6347'; this.trackColor = '#A04030'; this.turretColor = '#CC4030';
        this.score = 200; break;
      case 'armored':
        this.speed = 0.8; this.hp = 3; this.shootCooldown = 1800;
        this.color = '#8B0000'; this.trackColor = '#5A0000'; this.turretColor = '#6B0000';
        this.score = 300; break;
    }
    this.changeTimer = Math.floor(Math.random() * 120 + 60);
    this.dir = DIR.DOWN;
    this.moveDir = DIR.DOWN;
  }

  update(map, others, bullets, player, baseX, baseY) {
    if (!this.active) return;

    this.changeTimer--;

    // AI: decide direction and behavior
    if (this.changeTimer <= 0) {
      this.changeTimer = Math.floor(Math.random() * 100 + 50);

      // 40% chance to move toward player, 30% toward base, 30% random
      const rand = Math.random();
      if (rand < 0.4 && player && player.active) {
        // Move toward player
        const dx = player.cx - this.cx;
        const dy = player.cy - this.cy;
        if (Math.abs(dx) > Math.abs(dy)) {
          this.moveDir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
        } else {
          this.moveDir = dy > 0 ? DIR.DOWN : DIR.UP;
        }
      } else if (rand < 0.7) {
        // Move toward base
        const dx = baseX - this.cx;
        const dy = baseY - this.cy;
        if (Math.abs(dx) > Math.abs(dy)) {
          this.moveDir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
        } else {
          this.moveDir = dy > 0 ? DIR.DOWN : DIR.UP;
        }
      } else {
        // Random
        this.moveDir = Math.floor(Math.random() * 4);
      }
      this.dir = this.moveDir;
    }

    // Try to move
    const nx = this.x + DX[this.moveDir] * this.speed;
    const ny = this.y + DY[this.moveDir] * this.speed;

    if (this.canMove(nx, ny, map, others, this)) {
      this.x = nx;
      this.y = ny;
      this.dir = this.moveDir;
    } else {
      // Hit obstacle, change direction
      this.changeTimer = 0;
      // Try perpendicular directions first
      const perpDirs = [(this.moveDir + 1) % 4, (this.moveDir + 3) % 4];
      for (const d of perpDirs) {
        const tnx = this.x + DX[d] * this.speed;
        const tny = this.y + DY[d] * this.speed;
        if (this.canMove(tnx, tny, map, others, this)) {
          this.moveDir = d;
          this.dir = d;
          this.x = tnx; this.y = tny;
          break;
        }
      }
    }

    // Clamp
    this.x = Math.max(0, Math.min(W - this.size, this.x));
    this.y = Math.max(0, Math.min(H - this.size, this.y));

    // Shoot: randomly or if facing player
    let shouldShoot = Math.random() < 0.02;
    if (player && player.active) {
      const dx = player.cx - this.cx;
      const dy = player.cy - this.cy;
      const facingPlayer =
        (this.dir === DIR.UP && dy < 0 && Math.abs(dx) < this.size) ||
        (this.dir === DIR.DOWN && dy > 0 && Math.abs(dx) < this.size) ||
        (this.dir === DIR.LEFT && dx < 0 && Math.abs(dy) < this.size) ||
        (this.dir === DIR.RIGHT && dx > 0 && Math.abs(dy) < this.size);
      if (facingPlayer && Math.random() < 0.04) shouldShoot = true;
    }
    if (shouldShoot) this.shoot(bullets);
  }

  draw(ctx) {
    if (!this.active) return;
    const x = this.x, y = this.y, s = this.size;
    const cx = x + s/2, cy = y + s/2;

    ctx.save();

    // Body
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 3;

    const pad = 3;
    roundRect(ctx, x + pad, y + pad, s - pad*2, s - pad*2, 4);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Tracks
    ctx.fillStyle = this.trackColor;
    const trackW = 6, trackH = s - 8;
    ctx.fillRect(x + 2, y + 4, trackW, trackH);
    ctx.fillRect(x + s - 8, y + 4, trackW, trackH);

    // Turret
    ctx.fillStyle = this.turretColor;
    ctx.beginPath();
    ctx.arc(cx, cy, 7, 0, Math.PI * 2);
    ctx.fill();

    // Barrel
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + DX[this.dir] * 13, cy + DY[this.dir] * 13);
    ctx.stroke();

    // HP indicator (for armored)
    if (this.hp > 1) {
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('♥'.repeat(this.hp), cx, y - 3);
    }

    ctx.restore();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// === GAME ===
class Game {
  constructor() {
    this.state = 'title'; // title, playing, gameover
    this.map = [];
    this.player = null;
    this.enemies = [];
    this.bullets = [];
    this.explosions = [];
    this.score = 0;
    this.lives = 3;
    this.stage = 1;
    this.totalEnemies = 0;
    this.maxEnemies = 20;
    this.spawnedCount = 0;
    this.defeatedCount = 0;
    this.maxOnScreen = 4;
    this.spawnDelay = 0;
    this.spawnPositions = [
      { x: 2 * TILE + (TILE-36)/2, y: 2 * TILE + (TILE-36)/2 },
      { x: 12 * TILE + (TILE-36)/2, y: 2 * TILE + (TILE-36)/2 },
      { x: 22 * TILE + (TILE-36)/2, y: 2 * TILE + (TILE-36)/2 },
    ];
    this.baseDestroyed = false;
    this.stageClearTimer = 0;
    this.keys = {};
    this.lastTime = 0;

    this.spawnProtectionTimer = 0;
  }

  init() {
    this.map = generateMap();
    this.player = new PlayerTank(12 * TILE + (TILE-36)/2, 22 * TILE + (TILE-36)/2);
    this.player.active = true;
    this.player.invincible = true;
    this.player.invincibleTimer = 180; // 3 seconds at 60fps
    this.enemies = [];
    this.bullets = [];
    this.explosions = [];
    this.spawnedCount = 0;
    this.defeatedCount = 0;
    this.baseDestroyed = false;
    this.stageClearTimer = 0;
    this.spawnDelay = 60;
    this.totalEnemies = this.maxEnemies + (this.stage - 1) * 2;
    this.updateUI();
    this.state = 'playing';
    uiDiv.style.display = 'flex';
    controlsHint.style.display = 'block';
    infoDiv.style.display = 'none';
  }

  updateUI() {
    scoreSpan.textContent = this.score;
    stageSpan.textContent = this.stage;
    livesSpan.textContent = this.lives;
    const alive = this.totalEnemies - this.defeatedCount;
    enemiesSpan.textContent = alive > 0 ? alive : 0;
  }

  spawnEnemy() {
    const typeRand = Math.random();
    let type;
    if (this.stage >= 3 && typeRand < 0.2) type = 'armored';
    else if (this.stage >= 2 && typeRand < 0.45) type = 'fast';
    else type = 'basic';

    // Pick spawn position
    const pos = this.spawnPositions[this.spawnedCount % 3];
    // Check if the spawn area is clear of other tanks
    const checkRect = { x: pos.x - 4, y: pos.y - 4, w: 36 + 8, h: 36 + 8 };
    let clear = true;
    for (const e of this.enemies) {
      if (!e.active) continue;
      const er = e.getRect();
      if (checkRect.x < er.x + er.w && checkRect.x + checkRect.w > er.x &&
          checkRect.y < er.y + er.h && checkRect.y + checkRect.h > er.y) {
        clear = false; break;
      }
    }
    if (!clear) return false;
    if (this.player && this.player.active) {
      const pr = this.player.getRect();
      if (checkRect.x < pr.x + pr.w && checkRect.x + checkRect.w > pr.x &&
          checkRect.y < pr.y + pr.h && checkRect.y + checkRect.h > pr.y) {
        return false;
      }
    }

    const enemy = new EnemyTank(pos.x, pos.y, type);
    this.enemies.push(enemy);
    this.spawnedCount++;
    // Spawn flash effect
    for (let i = 0; i < 3; i++) {
      this.explosions.push(new Explosion(
        pos.x + 18, pos.y + 18, false
      ));
      this.explosions[this.explosions.length-1].life = 0.3;
    }
    return true;
  }

  update() {
    if (this.state === 'gameover') return;

    // --- Spawn enemies ---
    if (this.spawnedCount < this.totalEnemies) {
      const aliveEnemies = this.enemies.filter(e => e.active).length;
      if (aliveEnemies < this.maxOnScreen) {
        this.spawnDelay--;
        if (this.spawnDelay <= 0) {
          this.spawnDelay = 120;
          this.spawnEnemy();
        }
      }
    }

    // --- Update player ---
    if (this.player && this.player.active) {
      this.player.update(this.map, this.enemies, this.bullets, this.keys);
    }

    // --- Update enemies ---
    for (const enemy of this.enemies) {
      if (!enemy.active) continue;
      const baseCenterX = (Math.floor(COLS/2) - 0.5) * TILE;
      const baseCenterY = (ROWS - 1.5) * TILE;
      enemy.update(this.map, [this.player, ...this.enemies], this.bullets,
        this.player, baseCenterX, baseCenterY);
    }

    // --- Update bullets ---
    for (const bullet of this.bullets) {
      if (!bullet.active) continue;
      bullet.update(this.map);

      // Check bullet-tank collisions
      if (bullet.active) {
        // Player bullets vs enemies
        if (bullet.owner === 'player') {
          for (const enemy of this.enemies) {
            if (!enemy.active) continue;
            const r = enemy.getRect();
            if (bullet.x > r.x && bullet.x < r.x + r.w &&
                bullet.y > r.y && bullet.y < r.y + r.h) {
              enemy.hp--;
              bullet.active = false;
              if (enemy.hp <= 0) {
                enemy.active = false;
                this.defeatedCount++;
                this.score += enemy.score;
                this.explosions.push(new Explosion(enemy.cx, enemy.cy, true));
                this.updateUI();
              } else {
                this.explosions.push(new Explosion(enemy.cx, enemy.cy, false));
              }
              break;
            }
          }
        }
        // Enemy bullets vs player
        if (bullet.owner === 'enemy' && this.player && this.player.active) {
          const r = this.player.getRect();
          if (bullet.x > r.x && bullet.x < r.x + r.w &&
              bullet.y > r.y && bullet.y < r.y + r.h) {
            bullet.active = false;
            if (!this.player.invincible) {
              this.player.active = false;
              this.lives--;
              this.explosions.push(new Explosion(this.player.cx, this.player.cy, true));
              this.updateUI();
              if (this.lives > 0) {
                // Respawn
                setTimeout(() => {
                  if (this.state !== 'playing') return;
                  this.player.x = 12 * TILE + (TILE-36)/2;
                  this.player.y = 22 * TILE + (TILE-36)/2;
                  this.player.active = true;
                  this.player.invincible = true;
                  this.player.invincibleTimer = 180;
                  this.player.dir = DIR.UP;
                }, 1000);
              } else {
                this.state = 'gameover';
                this.showGameOver();
              }
            }
          }
        }
      }
    }

    // Clean up inactive
    this.bullets = this.bullets.filter(b => b.active);
    this.enemies = this.enemies.filter(e => e.active);
    // Keep dead enemies in array but flagged inactive

    // --- Update explosions ---
    for (const ex of this.explosions) {
      ex.update();
    }
    this.explosions = this.explosions.filter(e => e.active);

    // --- Check win condition ---
    if (this.spawnedCount >= this.totalEnemies && this.defeatedCount >= this.totalEnemies) {
      if (this.state === 'playing') {
        this.state = 'gameover';
        this.showStageClear();
      }
    }

    // --- Check base destroyed ---
    if (this.baseDestroyed) {
      this.state = 'gameover';
      this.showGameOver();
    }

    // Update player respawn blinking
    if (this.player && !this.player.active) {
      if (this.lives > 0) {
        this.player.respawnTimer = Math.min(this.player.respawnTimer + 1, 60);
      }
    }

    this.updateUI();
  }

  showGameOver() {
    infoDiv.style.display = 'flex';
    infoDiv.innerHTML = `
      <div class="game-over">GAME OVER</div>
      <div class="final-score">最终得分: ${this.score}</div>
      <div class="restart-hint">按 ENTER 重新开始</div>
    `;
    sfxExplode();
    setTimeout(() => sfxExplode(), 400);
  }

  showStageClear() {
    this.stageClearTimer = 120;
    infoDiv.style.display = 'flex';
    infoDiv.innerHTML = `
      <div style="font-size:42px;color:#4ECDC4;font-weight:bold;text-shadow:0 0 20px rgba(78,205,196,0.5);margin-bottom:10px;">STAGE CLEAR!</div>
      <div style="font-size:20px;color:#FFD700;margin-bottom:10px;">得分: ${this.score}</div>
      <div style="font-size:16px;color:#aaa;">下一关准备中...</div>
    `;
    setTimeout(() => {
      if (this.state === 'gameover') return;
      this.stage++;
      this.init();
    }, 3000);
  }

  restart() {
    this.score = 0;
    this.lives = 3;
    this.stage = 1;
    this.init();
  }

  draw() {
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, W, H);

    // Draw map
    this.drawMap(ctx);

    // Draw explosions
    for (const ex of this.explosions) {
      ex.draw(ctx);
    }

    // Draw tanks (player first, then enemies so player is on top)
    if (this.player) this.player.draw(ctx);
    for (const enemy of this.enemies) {
      enemy.draw(ctx);
    }

    // Draw bullets
    for (const bullet of this.bullets) {
      bullet.draw(ctx);
    }

    // Grid lines (subtle)
    if (this.state === 'playing') {
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 0.5;
      for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath(); ctx.moveTo(0, r*TILE); ctx.lineTo(W, r*TILE); ctx.stroke();
      }
      for (let c = 0; c <= COLS; c++) {
        ctx.beginPath(); ctx.moveTo(c*TILE, 0); ctx.lineTo(c*TILE, H); ctx.stroke();
      }
    }
  }

  drawMap(ctx) {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const tile = this.map[r][c];
        const x = c * TILE, y = r * TILE;
        if (tile === 1) {
          // Brick wall
          ctx.fillStyle = '#8B4513';
          ctx.fillRect(x, y, TILE, TILE);
          ctx.strokeStyle = '#6B3410';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(x, y, TILE, TILE);
          // Brick pattern
          ctx.strokeStyle = '#A0522D';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(x, y + TILE/2); ctx.lineTo(x + TILE, y + TILE/2);
          ctx.moveTo(x + TILE/2, y); ctx.lineTo(x + TILE/2, y + TILE/2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x + TILE/4, y + TILE/2); ctx.lineTo(x + TILE/4, y + TILE);
          ctx.moveTo(x + TILE*3/4, y + TILE/2); ctx.lineTo(x + TILE*3/4, y + TILE);
          ctx.stroke();
        } else if (tile === 2) {
          // Steel wall
          ctx.fillStyle = '#808080';
          ctx.fillRect(x, y, TILE, TILE);
          ctx.strokeStyle = '#999';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(x, y, TILE, TILE);
          ctx.fillStyle = '#999';
          ctx.fillRect(x + 3, y + 3, TILE/2-3, TILE/2-3);
          ctx.fillRect(x + TILE/2, y + 3, TILE/2-3, TILE/2-3);
          ctx.fillRect(x + 3, y + TILE/2, TILE/2-3, TILE/2-3);
          ctx.fillRect(x + TILE/2, y + TILE/2, TILE/2-3, TILE/2-3);
          // Rivets
          ctx.fillStyle = '#666';
          [
            [x+4,y+4],[x+TILE-5,y+4],[x+4,y+TILE-5],[x+TILE-5,y+TILE-5],
            [x+TILE/2,y+4],[x+4,y+TILE/2],[x+TILE-5,y+TILE/2],[x+TILE/2,y+TILE-5]
          ].forEach(([px,py]) => {
            ctx.beginPath(); ctx.arc(px, py, 1.5, 0, Math.PI*2); ctx.fill();
          });
        } else if (tile === 3) {
          // Base / Eagle
          const gx = x + TILE/2, gy = y + TILE/2;
          ctx.fillStyle = '#FFD700';
          ctx.shadowColor = '#FFD700';
          ctx.shadowBlur = 10;
          // Eagle shape (simple)
          ctx.beginPath();
          ctx.moveTo(gx, gy - 10);
          ctx.lineTo(gx - 8, gy + 2);
          ctx.lineTo(gx - 3, gy + 2);
          ctx.lineTo(gx - 5, gy + 10);
          ctx.lineTo(gx, gy + 4);
          ctx.lineTo(gx + 5, gy + 10);
          ctx.lineTo(gx + 3, gy + 2);
          ctx.lineTo(gx + 8, gy + 2);
          ctx.closePath();
          ctx.fill();
          ctx.shadowBlur = 0;
          // Text
          ctx.fillStyle = '#B8860B';
          ctx.font = 'bold 14px Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('★', gx, gy + 1);
        } else if (tile === 4) {
          // Base wall (brick variant)
          ctx.fillStyle = '#A0522D';
          ctx.fillRect(x, y, TILE, TILE);
          ctx.strokeStyle = '#7A3B1A';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(x, y, TILE, TILE);
          ctx.fillStyle = '#C47A3E';
          ctx.fillRect(x + 2, y + 2, TILE-4, TILE-4);
          ctx.strokeStyle = '#8B5E3C';
          ctx.strokeRect(x + 2, y + 2, TILE-4, TILE-4);
        }
      }
    }
  }
}

// === GAME LOOP ===
const game = new Game();

function gameLoop(time) {
  if (game.state === 'playing') {
    game.update();
  }
  game.draw();
  requestAnimationFrame(gameLoop);
}

// === INPUT ===
document.addEventListener('keydown', (e) => {
  game.keys[e.key] = true;
  if (e.key === ' ' || e.key === 'Space') e.preventDefault();

  if (e.key === 'Enter') {
    if (game.state === 'title') {
      game.restart();
    } else if (game.state === 'gameover') {
      game.restart();
    }
  }
});

document.addEventListener('keyup', (e) => {
  game.keys[e.key] = false;
});

// Prevent page scroll with arrows
window.addEventListener('keydown', (e) => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
    e.preventDefault();
  }
});

// === START ===
game.draw(); // Draw the title screen
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
